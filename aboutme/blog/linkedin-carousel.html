<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Posts</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: transparent;
      color: #2c2c2c;
    }

    .carousel-section {
      width: 100%;
      padding: 10px 0 20px;
    }

    .carousel-section h2 {
      font-family: 'Source Serif 4', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .carousel-section .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
    }

    .carousel-section .subtitle a {
      color: #0a66c2;
      text-decoration: none;
    }

    .carousel-section .subtitle a:hover {
      text-decoration: underline;
    }

    /* Track wrapper */
    .carousel-outer {
      position: relative;
    }

    .carousel-track-wrapper {
      overflow: hidden;
      border-radius: 10px;
    }

    .carousel-track {
      display: flex;
      gap: 18px;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }

    /* Cards */
    .post-card {
      flex: 0 0 calc(33.333% - 12px);
      background: #ffffff;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    .post-card:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }

    .post-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      background: #f0f0f0;
    }

    .post-card .no-image {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .post-card .no-image svg {
      opacity: 0.25;
    }

    .card-body {
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-date {
      font-size: 11px;
      color: #999;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .card-text {
      font-size: 13.5px;
      line-height: 1.65;
      color: #3a3a3a;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-link {
      margin-top: 14px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      color: #0a66c2;
      text-decoration: none;
      letter-spacing: 0.3px;
    }

    .card-link:hover {
      text-decoration: underline;
    }

    .card-link svg {
      flex-shrink: 0;
    }

    /* Navigation */
    .carousel-nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }

    .nav-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid #ddd;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      color: #444;
    }

    .nav-btn:hover {
      background: #f5f5f5;
      border-color: #bbb;
    }

    .nav-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .nav-dots {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-right: auto;
    }

    .nav-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ddd;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      border: none;
      padding: 0;
    }

    .nav-dot.active {
      background: #0a66c2;
      transform: scale(1.2);
    }

    /* Responsive */
    @media (max-width: 700px) {
      .post-card {
        flex: 0 0 85%;
      }
    }
  </style>
</head>
<body>

  <div class="carousel-section">
    <h2>Latest from LinkedIn</h2>
    <p class="subtitle">
      Thoughts, updates, and reflections &mdash;
      <a href="https://www.linkedin.com/in/YOUR-PROFILE-URL" target="_blank">follow me on LinkedIn →</a>
    </p>

    <div class="carousel-outer">
      <div class="carousel-track-wrapper">
        <div class="carousel-track" id="carouselTrack"></div>
      </div>

      <div class="carousel-nav">
        <div class="nav-dots" id="navDots"></div>
        <button class="nav-btn" id="prevBtn" aria-label="Previous">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <button class="nav-btn" id="nextBtn" aria-label="Next">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    // ─── YOUR LINKEDIN POSTS ──────────────────────────────────────────────────
    // Edit this array to add your own posts.
    // - image: path to an image file, or "" for no image
    // - date: display date string
    // - text: the post text (will be truncated to 5 lines automatically)
    // - link: the full URL to your LinkedIn post
    const posts = [
      {
        image: "",   // e.g. "images/post1.jpg" or a full URL
        date: "January 15, 2025",
        text: "Paste the text of your first LinkedIn post here. It will automatically truncate to five lines with an overflow, keeping the card size consistent no matter how long the post is.",
        link: "https://www.linkedin.com/posts/YOUR-POST-URL-1"
      },
      {
        image: "",
        date: "February 3, 2025",
        text: "Paste the text of your second LinkedIn post here. Add as many posts as you like — the carousel handles any number of them.",
        link: "https://www.linkedin.com/posts/YOUR-POST-URL-2"
      },
      {
        image: "",
        date: "February 20, 2025",
        text: "Paste the text of your third LinkedIn post here. The navigation dots and arrows update automatically based on how many posts you add.",
        link: "https://www.linkedin.com/posts/YOUR-POST-URL-3"
      },
      {
        image: "",
        date: "March 5, 2025",
        text: "Paste the text of your fourth LinkedIn post here.",
        link: "https://www.linkedin.com/posts/YOUR-POST-URL-4"
      },
      {
        image: "",
        date: "March 18, 2025",
        text: "Paste the text of your fifth LinkedIn post here.",
        link: "https://www.linkedin.com/posts/YOUR-POST-URL-5"
      }
    ];
    // ─────────────────────────────────────────────────────────────────────────

    const track = document.getElementById('carouselTrack');
    const dotsContainer = document.getElementById('navDots');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    const visibleCount = window.innerWidth <= 700 ? 1 : 3;
    const maxIndex = Math.max(0, posts.length - visibleCount);
    let currentIndex = 0;

    // Build cards
    posts.forEach(post => {
      const card = document.createElement('div');
      card.className = 'post-card';

      const imgHTML = post.image
        ? `<img src="${post.image}" alt="Post image" loading="lazy" />`
        : `<div class="no-image">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
           </div>`;

      card.innerHTML = `
        ${imgHTML}
        <div class="card-body">
          <div class="card-date">${post.date}</div>
          <div class="card-text">${post.text}</div>
          <a class="card-link" href="${post.link}" target="_blank" rel="noopener">
            View on LinkedIn
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>
            </svg>
          </a>
        </div>
      `;
      track.appendChild(card);
    });

    // Build dots
    for (let i = 0; i <= maxIndex; i++) {
      const dot = document.createElement('button');
      dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
      dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
      dot.addEventListener('click', () => goTo(i));
      dotsContainer.appendChild(dot);
    }

    function goTo(index) {
      currentIndex = Math.max(0, Math.min(index, maxIndex));
      const cardWidth = track.children[0].offsetWidth + 18;
      track.style.transform = `translateX(-${currentIndex * cardWidth}px)`;

      document.querySelectorAll('.nav-dot').forEach((d, i) => {
        d.classList.toggle('active', i === currentIndex);
      });

      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === maxIndex;
    }

    prevBtn.addEventListener('click', () => goTo(currentIndex - 1));
    nextBtn.addEventListener('click', () => goTo(currentIndex + 1));

    // Init
    goTo(0);
  </script>

</body>
</html>
