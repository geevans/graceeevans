<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Places Map</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #667caf;
      color: #e8e0d5;
    }

    #map-wrapper {
      position: relative;
      width: 100%;
      height: 520px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Custom popup styling */
    .leaflet-popup-content-wrapper {
      background: #667caf;
      border: 1px solid rgba(212, 175, 100, 0.4);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      padding: 0;
      overflow: hidden;
    }

    .leaflet-popup-content {
      margin: 0;
      width: 260px !important;
    }

    .leaflet-popup-tip {
      background: #667caf;
    }

    .leaflet-popup-close-button {
      color: #d4af64 !important;
      font-size: 18px !important;
      top: 8px !important;
      right: 10px !important;
    }

    .popup-inner {
      padding: 20px 22px 18px;
    }

    .popup-category {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #d4af64;
      margin-bottom: 6px;
    }

    .popup-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
      color: #f0e8d8;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .popup-desc {
      font-size: 13px;
      line-height: 1.6;
      color: #f0e8d8;
      font-weight: 300;
    }

    .popup-year {
      margin-top: 12px;
      font-size: 11px;
      color: #f0e8d8;
      letter-spacing: 1px;
    }

    /* Custom marker */
    .custom-marker {
      width: 14px;
      height: 14px;
      background: #d4af64;
      border: 2px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(212,175,100,0.3), 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.2s ease;
      cursor: pointer;
    }

    .custom-marker:hover {
      transform: scale(1.3);
    }

    /* Map attribution */
    .leaflet-control-attribution {
      background: rgba(15,15,15,0.7) !important;
      color: #555 !important;
      font-size: 10px;
    }

    .leaflet-control-attribution a {
      color: #888 !important;
    }

    /* Zoom controls */
    .leaflet-control-zoom a {
      background: #667caf !important;
      color: #d4af64 !important;
      border-color: rgba(212,175,100,0.3) !important;
    }

    .leaflet-control-zoom a:hover {
      background: #252525 !important;
    }

    /* Map legend */
    #map-legend {
      margin-top: 14px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
      padding: 0 4px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #d4af64;
      border: 1.5px solid #fff;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="map-wrapper">
    <div id="map"></div>
  </div>

  <div id="map-legend">
    <div class="legend-item">
      <div class="legend-dot"></div>
      <span>Click any marker to learn more</span>
    </div>
  </div>

  <script>
    // ─── YOUR PLACES DATA ─────────────────────────────────────────────────────
    // Edit this array to add/remove/modify your places!
    const places = [
      {
        name: "Mt. Lebanon, Pennsylvania",
        lat: 40.3870,
        lng: -80.0438,
        category: "Birthplace",
        description: "Where I was born and lived for five days. Of course I've been back many times since to jog my memory and pop into Badamo's Pizza!",
        year: "2005"
      },
      {
        name: "New Wilmington, Pennsylvania",
        lat: 41.1223,
        lng: -80.3328,
        category: "Lived Here",
        description: "Spent the first five years of my life here. You only get to live nextdoor to an Amish farm once!",
        year: "2005-2011"
      },
      {
        name: "Amstelveen, Netherlands",
        lat: 52.3114,
        lng: 4.8701,
        category: "Lived Here",
        description: "Spent the next three years attending an international school at the heart of Amstelveen. Traveled to some of Europe's hidden -- and not so hidden -- gems.",
        year: "2011-2013"
      },
      {
        name: "Sewickley, Pennsylvania",
        lat: 40.5365,
        lng: -80.1844,
        category: "Lived Here",
        description: "Spent the remainder of my childhood here and graduated from high school.",
        year: "2014–2023"
      },
      {
        name: "Williamsburg, Virginia",
        lat: 37.2757,
        lng: -76.7098,
        category: "Living Here",
        description: "Stumbled upon a College that fits me perfectly! Planning to finish my undergraduate career in May and then begin a one-year master's program in the Fall!",
        year: "2023-Present"
      },
      {
        name: "La Plata, Argentina",
        lat: -34.9205,
        lng: -57.9536,
        category: "Interned Here",
        description: "Spent the summer after my sophomore year of college interning at a government commissioned agency in this artsy, beautiful city. Tried some of the most incredible steak of my life!",
        year: "Summer 2025"
      },
      {
        name: "Nuevo Arenal, Costa Rica",
        lat: 10.5451,
        lng: -84.8921,
        category: "Interned Here",
        description: "Spent the summer after my freshman year of college interning at an education non-profit that teaches K-12 students English. Met amazing people and lived within an hour of a volcano!",
        year: "Summer 2024"
      }
    ];
    // ─────────────────────────────────────────────────────────────────────────

    // Initialize map
    const map = L.map('map', {
      center: [25, 10],
      zoom: 2,
      zoomControl: true,
      scrollWheelZoom: false   // set to true if you prefer scroll-to-zoom
    });

    // Dark tile layer (CartoDB Dark Matter)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    // Custom icon factory
    function makeIcon() {
      return L.divIcon({
        className: '',
        html: '<div class="custom-marker"></div>',
        iconSize: [14, 14],
        iconAnchor: [7, 7],
        popupAnchor: [0, -12]
      });
    }

    // Add markers
    places.forEach(place => {
      const marker = L.marker([place.lat, place.lng], { icon: makeIcon() }).addTo(map);

      const popupContent = `
        <div class="popup-inner">
          <div class="popup-category">${place.category}</div>
          <div class="popup-title">${place.name}</div>
          <div class="popup-desc">${place.description}</div>
          <div class="popup-year">${place.year}</div>
        </div>
      `;

      marker.bindPopup(popupContent, {
        maxWidth: 280,
        closeButton: true,
        autoPan: true
      });
    });
  </script>
</body>
</html>
